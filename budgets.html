<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EYQ — Budgets & Reporting</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="motif-theme-dark">

<header class="top-bar">
  <div class="top-bar-left"><a href="index.html" class="logo"><span class="logo-mark">EY</span> EYQ</a><div class="divider-v"></div><div class="ws-switcher ws-private" onclick="toggleWorkspaceDropdown(event)"><div class="ws-switcher-icon">P</div><div><div class="ws-switcher-label">My Private</div><div class="ws-switcher-meta">Free tier</div></div><span class="ws-switcher-arrow"><i class="fas fa-chevron-down"></i></span></div><div class="ws-dropdown hidden"></div></div>
  <div class="top-bar-right"><div class="role-chip-bar"><span>Consultant, Consulting</span></div><button class="notif-btn" id="theme-toggle-btn" onclick="toggleTheme()"><i class="fas fa-sun"></i></button><a href="approvals.html" class="notif-btn"><i class="fas fa-bell"></i><span class="notif-dot"></span></a><div class="avatar">AM</div></div>
</header>
<nav class="left-nav" role="navigation"></nav>

<main class="app-content">
  <div id="banner-area"></div>
  <div class="page-container">
    <nav style="font-size:0.786rem;color:var(--ey-gray-500);margin-bottom:16px"><a href="index.html">Home</a> <i class="fas fa-chevron-right" style="font-size:0.6rem;margin:0 6px"></i> Budgets & Reporting</nav>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <div><h1 style="font-size:1.5rem">Budgets & Reporting</h1><p class="text-muted">Monitor workspace spend, budgets, and ROI.</p></div>
      <select class="form-select" style="width:auto;min-width:220px" id="budget-ws-select" onchange="renderBudgetPage()">
        <option value="acme">ACME Retail RFP Team</option><option value="globo">GloboCo Finance Controls</option><option value="retail">Retail Q2 Pitch (Pending)</option>
      </select>
    </div>
    <div id="budget-content"></div>
  </div>
</main>

<div class="modal-overlay" id="ws-create-modal"><div class="modal"><div class="modal-header"><h2>Create Team Workspace</h2><button class="modal-close" onclick="closeModal('ws-create-modal')">&times;</button></div><div class="stepper"><div class="step active"><span class="step-num">1</span> Basics</div><div class="step-connector"></div><div class="step"><span class="step-num">2</span> Engagement Code</div><div class="step-connector"></div><div class="step"><span class="step-num">3</span> Members & Assets</div><div class="step-connector"></div><div class="step"><span class="step-num">4</span> Budgets & Policies</div></div><div class="modal-body" id="ws-create-body"></div><div class="modal-footer" id="ws-create-footer"></div></div></div>
<div class="run-panel-overlay" id="run-panel" onclick="if(event.target===this)closeModal('run-panel')"><div class="run-panel"><div class="run-panel-header"><h3>Run Asset</h3><button class="modal-close" onclick="closeModal('run-panel')">&times;</button></div><div class="run-panel-body" id="run-panel-body"></div><div class="run-panel-footer" id="run-panel-footer"></div></div></div>
<div class="state-switcher"><div class="state-switcher-header" onclick="toggleStateSwitcher()"><span><i class="fas fa-sliders-h"></i> Prototype States</span><i class="fas fa-chevron-up"></i></div><div class="state-switcher-body"></div></div>

<script src="app.js"></script>
<script>
const BD = {
  acme: { name:'ACME Retail RFP Team', code:'ENG-ACME-2026-001', budget:25000, used:10500, pct:42, forecast:2100, timeSaved:142, weeklyData:[1200,1800,1500,2100,1900,1400,1600], labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    byAsset:[{n:'RFP Draft Agent',s:4200,r:45,p:40},{n:'Policy Q&A Agent',s:0,r:120,p:0},{n:'Controls Packager',s:3800,r:22,p:36},{n:'Other',s:2500,r:18,p:24}],
    topUsers:[{n:'Alex Morgan',s:3400,w:34},{n:'Jane Patel',s:2800,w:48},{n:'Sarah Kim',s:2100,w:22},{n:'Raj Patel',s:1400,w:15}],
    alerts:[{t:'info',i:'fa-chart-line',m:'7-day forecast: $2,100. On track.'},{t:'success',i:'fa-check-circle',m:'All users within weekly caps.'}] },
  globo: { name:'GloboCo Finance Controls', code:'ENG-GLOBO-2026-014', budget:40000, used:26800, pct:67, forecast:4200, timeSaved:210, weeklyData:[3200,4100,3800,4500,3900,2800,3500], labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    byAsset:[{n:'Controls Packager',s:12400,r:68,p:46},{n:'Controls Roleplay',s:5600,r:35,p:21},{n:'RFP Draft Agent',s:4800,r:52,p:18},{n:'Other',s:4000,r:40,p:15}],
    topUsers:[{n:'Miguel Santos',s:8200,w:82},{n:'Alex Morgan',s:6400,w:64},{n:'David Brown',s:5100,w:51},{n:'Maria Garcia',s:4200,w:42}],
    alerts:[{t:'warning',i:'fa-exclamation-triangle',m:'Approaching soft cap (75%). Currently 67%.'},{t:'warning',i:'fa-user-clock',m:'Miguel Santos at 82% of weekly cap.'},{t:'info',i:'fa-chart-line',m:'7-day forecast: $4,200.'}] },
  retail: { pending: true, name: 'Retail Q2 Pitch' }
};

function renderBudgetPage() {
  const id = $('#budget-ws-select').value;
  const d = BD[id];
  const c = $('#budget-content');
  if (!d) return;
  if (d.pending) { c.innerHTML = `<div class="card" style="text-align:center;padding:60px"><div class="completion-icon pending"><i class="fas fa-clock"></i></div><h2>Workspace Pending Approval</h2><p style="margin-top:8px">Free assets available. Budget tracking starts after approval.</p><div style="margin-top:20px;display:flex;gap:8px;justify-content:center"><button class="btn btn-primary" onclick="alert('Reminder sent')"><i class="fas fa-bell"></i> Nudge Approver</button><button class="btn btn-secondary" onclick="navigateTo('finder.html')">Browse Free Assets</button></div></div>`; return; }

  const barMax = Math.max(...d.weeklyData);
  const bars = d.weeklyData.map((v,i) => `<div class="chart-bar" style="height:${(v/barMax)*140}px"><span class="chart-bar-value">$${v}</span><span class="chart-bar-label">${d.labels[i]}</span></div>`).join('') + `<div class="chart-bar forecast" style="height:${(d.forecast/7/barMax)*140}px"><span class="chart-bar-value" style="color:var(--ey-blue)">~$${Math.round(d.forecast/7)}/d</span><span class="chart-bar-label">Forecast</span></div>`;
  const col = d.pct >= 100 ? 'red' : d.pct >= 75 ? 'orange' : 'green';
  const roi = d.timeSaved ? ((d.timeSaved * 150) / d.used).toFixed(1) : 'N/A';

  c.innerHTML = `
    <div class="stat-row">
      <div class="stat-box"><div class="stat-value">$${d.used.toLocaleString()}</div><div class="stat-label">Total Spend</div></div>
      <div class="stat-box"><div class="stat-value">$${d.budget.toLocaleString()}</div><div class="stat-label">Monthly Budget</div></div>
      <div class="stat-box"><div class="stat-value">${d.pct}%</div><div class="stat-label">Budget Used</div></div>
      <div class="stat-box"><div class="stat-value">$${d.forecast.toLocaleString()}</div><div class="stat-label">7-Day Forecast</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card" style="padding:20px"><h3 style="margin-bottom:16px"><i class="fas fa-chart-bar" style="color:var(--ey-blue);margin-right:6px"></i> Budget vs Actual</h3>
        <div style="display:flex;justify-content:space-between;font-size:0.857rem;margin-bottom:6px"><span style="font-weight:600">${d.name}</span><span>$${d.used.toLocaleString()} / $${d.budget.toLocaleString()}</span></div>
        <div class="progress-bar" style="height:12px"><div class="progress-fill ${col}" style="width:${d.pct}%"></div></div>
        <div class="progress-markers" style="height:16px"><span class="progress-marker" style="left:75%">75% soft</span><span class="progress-marker" style="left:100%">100% hard</span></div>
      </div>
      <div class="card" style="padding:20px"><h3 style="margin-bottom:16px"><i class="fas fa-chart-line" style="color:var(--ey-green);margin-right:6px"></i> Daily Spend</h3><div style="height:180px;display:flex;align-items:flex-end"><div class="chart-bars" style="width:100%">${bars}</div></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card" style="padding:20px"><h3 style="margin-bottom:12px"><i class="fas fa-puzzle-piece" style="color:var(--ey-purple);margin-right:6px"></i> Spend by Asset</h3>
        <table class="data-table"><thead><tr><th>Asset</th><th>Spend</th><th>Runs</th><th>Share</th></tr></thead><tbody>
        ${d.byAsset.map(a => `<tr><td style="font-weight:500">${a.n}</td><td>${a.s>0?'$'+a.s.toLocaleString():'Free'}</td><td>${a.r}</td><td>${a.p>0?a.p+'%':'-'}<span class="mini-bar"><span class="mini-bar-fill" style="width:${a.p}%;background:var(--ey-blue)"></span></span></td></tr>`).join('')}
        </tbody></table></div>
      <div class="card" style="padding:20px"><h3 style="margin-bottom:12px"><i class="fas fa-users" style="color:var(--ey-orange);margin-right:6px"></i> Top Users</h3>
        <table class="data-table"><thead><tr><th>User</th><th>Spend</th><th>Weekly/$100</th><th></th></tr></thead><tbody>
        ${d.topUsers.map(u => `<tr><td style="font-weight:500">${u.n}</td><td>$${u.s.toLocaleString()}</td><td>$${u.w}<span class="mini-bar"><span class="mini-bar-fill" style="width:${u.w}%;background:${u.w>=80?'var(--ey-orange)':'var(--ey-green)'}"></span></span></td><td>${u.w>=80?'<span class="chip chip-orange" style="font-size:9px">Near cap</span>':''}</td></tr>`).join('')}
        </tbody></table></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card" style="padding:20px"><h3 style="margin-bottom:12px"><i class="fas fa-tachometer-alt" style="color:var(--ey-purple);margin-right:6px"></i> ROI: Time Saved vs Spend</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div class="stat-box" style="padding:12px"><div class="stat-value" style="font-size:1.286rem">${d.timeSaved}h</div><div class="stat-label">Time Saved</div></div>
          <div class="stat-box" style="padding:12px"><div class="stat-value" style="font-size:1.286rem">${roi}x</div><div class="stat-label">ROI Ratio</div></div>
        </div>
        <p class="text-xs text-muted">Estimated at $150/hr consultant rate. Time saved based on task completion benchmarks.</p>
      </div>
      <div class="card" style="padding:20px"><h3 style="margin-bottom:12px"><i class="fas fa-bell" style="color:var(--ey-orange);margin-right:6px"></i> Alerts</h3>
        <div style="display:flex;flex-direction:column;gap:8px">
        ${d.alerts.map(a => { const bg = a.t==='warning'?'var(--badge-warning-bg)':a.t==='success'?'var(--badge-success-bg)':'var(--badge-info-bg)'; const tc = a.t==='warning'?'var(--ey-orange)':a.t==='success'?'var(--ey-green)':'var(--ey-blue)'; return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:${bg};border-radius:var(--radius-md);font-size:0.857rem;color:${tc}"><i class="fas ${a.i}"></i> ${a.m}</div>`; }).join('')}
        </div></div>
    </div>`;
}
function updatePageUI() { renderBudgetPage(); }
</script>
</body>
</html>
